<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portal</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { text-align: center; width: 90%; max-width: 500px; }
        input { width: 100%; padding: 15px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    </style>
    <!-- Script order is critical -->
    <script src="/baremux/index.js"></script>
    <script src="/baremux/epoxy.js"></script>
    <script src="/scram/scramjet.all.js"></script>
</head>
<body>
    <div class="box">
        <h1>Web Browser Context</h1>
        <form id="proxy-form">
            <input type="text" id="url-input" placeholder="Enter full URL (e.g., https://example.com)...">
        </form>
    </div>
    <script src="/main.js"></script>
</body>
</html>
